    <style>
        :root{
            --primary:#0a1628;
            --primary-dark:#040a14;
            --secondary:#1b3a4a;
            --accent:#b8883e;
            --accent-glow:rgba(184,136,62,0.3);
            --gold:#b8883e;
            --gold-light:rgba(184,136,62,0.12);
            --surface:rgba(255,255,255,0.75);
            --surface-hover:rgba(255,255,255,0.92);
            --background:#ece9e4;
            --text:#0a1628;
            --text-light:#4a5568;
            --border:rgba(10,22,40,0.1);
            --border-strong:rgba(10,22,40,0.18);
            --glass-blur:20px;
            --radius:16px;
            --shadow:0 4px 24px rgba(10,22,40,0.06);
            --shadow-lg:0 16px 48px rgba(10,22,40,0.1);
            --transition:0.5s cubic-bezier(0.22,0.61,0.36,1);
        }
        body.dark{
            --primary:#e2e8f0;
            --primary-dark:#cbd5e1;
            --secondary:#4a8c9c;
            --accent:#d4a853;
            --accent-glow:rgba(212,168,83,0.4);
            --gold:#d4a853;
            --gold-light:rgba(212,168,83,0.12);
            --surface:rgba(10,22,40,0.55);
            --surface-hover:rgba(10,22,40,0.75);
            --background:#070b14;
            --text:#e2e8f0;
            --text-light:#8892a4;
            --border:rgba(255,255,255,0.08);
            --border-strong:rgba(255,255,255,0.15);
            --shadow:0 4px 24px rgba(0,0,0,0.5);
            --shadow-lg:0 16px 48px rgba(0,0,0,0.7);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth;overflow-y:scroll;height:100%}
        body{font-family:'Poppins',sans-serif;background:var(--background);color:var(--text);line-height:1.7;transition:var(--transition);overflow-x:hidden;font-weight:400;min-height:100%}
        img{max-width:100%;display:block}
        .container{width:min(1100px,90%);margin:auto;position:relative;z-index:2}
        section{padding:80px 0;position:relative;z-index:2}
        section h2{text-align:center;font-size:2.1rem;margin-bottom:8px;font-weight:700;letter-spacing:-.5px;color:var(--primary)}
        section h2 .accent-text{color:var(--accent)}
        section>div>p{text-align:center;max-width:650px;margin:0 auto 30px;color:var(--text-light);font-size:.9rem;line-height:1.8}
        @media(max-width:768px){section{padding:60px 0}}

        #topologyCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

        #floatingMsgContainer{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:998;display:flex;flex-direction:column;align-items:flex-end;gap:12px}
        #floatingBtn{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--accent));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px var(--accent-glow),0 0 0 0 var(--accent-glow);animation:floatPulse 2.5s ease-in-out infinite;cursor:pointer;border:2px solid rgba(255,255,255,0.25);transition:all 0.4s ease;font-size:1.3rem;color:#fff;position:relative;z-index:2}
        @keyframes floatPulse{0%,100%{box-shadow:0 8px 30px var(--accent-glow),0 0 0 0 var(--accent-glow)}50%{box-shadow:0 8px 30px var(--accent-glow),0 0 0 16px rgba(184,136,62,0)}}
        #floatingBtn:hover{transform:scale(1.08)}#floatingBtn.active{transform:rotate(45deg);background:var(--primary)}
        .float-popup{position:absolute;right:70px;top:50%;transform:translateY(-50%);width:320px;background:var(--surface);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);border:2px solid var(--border-strong);border-radius:20px;padding:24px 20px;box-shadow:var(--shadow-lg);opacity:0;visibility:hidden;transition:all 0.35s cubic-bezier(0.22,0.61,0.36,1);z-index:1}
        .float-popup.show{opacity:1;visibility:visible}
        .float-popup h3{font-size:.95rem;font-weight:700;color:var(--primary);margin-bottom:14px;text-align:center}
        .float-popup input,.float-popup textarea{width:100%;padding:12px 14px;margin-bottom:10px;border:2px solid var(--border-strong);border-radius:12px;font-family:'Poppins',sans-serif;font-size:.8rem;background:rgba(255,255,255,0.3);color:var(--text);resize:vertical;transition:all 0.3s ease}
        body.dark .float-popup input,body.dark .float-popup textarea{background:rgba(255,255,255,0.05)}
        .float-popup input:focus,.float-popup textarea:focus{outline:none;border-color:var(--accent)}
        .float-popup textarea{min-height:80px}
        .float-popup .btn-send{width:100%;padding:12px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--accent));color:#fff;border:none;font-weight:600;font-size:.85rem;cursor:pointer;transition:all 0.3s ease;font-family:'Poppins',sans-serif}
        .float-popup .btn-send:hover{transform:translateY(-2px);box-shadow:0 8px 25px var(--accent-glow)}
        .float-popup .btn-close{position:absolute;top:8px;right:12px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-light)}.float-popup .btn-close:hover{color:var(--accent)}
        @media(max-width:600px){#floatingMsgContainer{right:8px}#floatingBtn{width:48px;height:48px;font-size:1.1rem}.float-popup{width:280px;right:56px;padding:18px 14px}}

        .news-ticker{background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--secondary));background-size:300% 300%;animation:bannerGradientShift 8s ease infinite;color:#fff;padding:10px 0;font-size:.8rem;font-weight:500;overflow:hidden;position:relative;z-index:1000;white-space:nowrap;letter-spacing:.4px;border-bottom:3px solid var(--gold);box-shadow:0 4px 25px rgba(0,0,0,0.2)}
        @keyframes bannerGradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .news-ticker::before{content:"";position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--accent),var(--gold),transparent);animation:bannerGlowLine 3s ease-in-out infinite;z-index:2}
        @keyframes bannerGlowLine{0%,100%{opacity:0.4;transform:scaleX(0.8)}50%{opacity:1;transform:scaleX(1)}}
        .news-ticker::after{content:"";position:absolute;bottom:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--gold),var(--accent),transparent);animation:bannerGlowLine 3s ease-in-out infinite;animation-delay:1.5s;z-index:2}
        .news-ticker .ticker-content{display:inline-flex;align-items:center;gap:20px;animation:tickerScroll 30s linear infinite;padding-left:100%}
        @keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
        .ticker-icon{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.2);font-size:.9rem;animation:tickerIconPulse 2s ease-in-out infinite}
        @keyframes tickerIconPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
        .ticker-highlight{color:var(--gold);font-weight:700;letter-spacing:.5px;animation:tickerHighlight 1.5s ease-in-out infinite}
        @keyframes tickerHighlight{0%,100%{text-shadow:0 0 6px rgba(184,136,62,0.3)}50%{text-shadow:0 0 18px rgba(184,136,62,0.6)}}

        #bootLoader{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.6s ease,visibility 0.6s ease;pointer-events:all}
        #bootLoader.hidden{opacity:0;visibility:hidden;pointer-events:none}
        .boot-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(4,10,20,0.95);z-index:0}
        .boot-terminal{position:relative;z-index:1;background:rgba(10,22,40,0.95);border:1px solid rgba(184,136,62,0.3);border-radius:16px;padding:30px 28px;width:min(550px,92%);max-height:80vh;overflow:hidden;box-shadow:0 0 60px rgba(184,136,62,0.1),0 20px 60px rgba(0,0,0,0.5);font-family:'JetBrains Mono',monospace}
        .boot-header{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.08)}
        .boot-dot{width:10px;height:10px;border-radius:50%}.boot-dot.red{background:#c9485e}.boot-dot.amber{background:#d4a853}.boot-dot.green{background:#3fb950}
        .boot-title{color:#8892a4;font-size:.7rem;margin-left:8px;letter-spacing:1px}
        .boot-logs{font-size:.68rem;line-height:1.8;color:#8892a4;max-height:250px;overflow-y:auto;margin-bottom:12px}
        .boot-logs .log-line{margin-bottom:2px;opacity:0;animation:logFadeIn 0.1s forwards}
        .boot-logs .log-line:nth-child(1){animation-delay:0.1s}.boot-logs .log-line:nth-child(2){animation-delay:0.3s}.boot-logs .log-line:nth-child(3){animation-delay:0.5s}.boot-logs .log-line:nth-child(4){animation-delay:0.7s}.boot-logs .log-line:nth-child(5){animation-delay:0.9s}.boot-logs .log-line:nth-child(6){animation-delay:1.1s}.boot-logs .log-line:nth-child(7){animation-delay:1.3s}.boot-logs .log-line:nth-child(8){animation-delay:1.5s}.boot-logs .log-line:nth-child(9){animation-delay:1.7s}.boot-logs .log-line:nth-child(10){animation-delay:1.9s}
        @keyframes logFadeIn{to{opacity:1}}
        .boot-logs .prompt{color:#7eb8da}.boot-logs .ok{color:#3fb950}.boot-logs .info{color:#8892a4}
        .boot-status-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-bottom:8px}
        .boot-status-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:3px;transition:width 0.3s ease}
        .boot-status-text{font-size:.65rem;color:var(--gold);text-align:right;margin-bottom:4px}
        .boot-ready{text-align:center;margin-top:16px;opacity:0;transition:opacity 0.5s ease}.boot-ready.show{opacity:1}
        .boot-ready .ready-text{font-size:1rem;font-weight:700;color:#3fb950;letter-spacing:1px}
